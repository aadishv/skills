<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Browser Use Bridge</title>
    <style>
      :root { color-scheme: light dark; font: 14px/1.45 system-ui, sans-serif; }
      body { margin: 0 auto; max-width: 680px; padding: 32px 20px; }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { color: #777; }
      label { display: block; font-weight: 600; margin-top: 20px; }
      input { box-sizing: border-box; display: block; font: inherit; margin-top: 6px; padding: 8px; width: 100%; }
      button { font: inherit; margin-top: 20px; padding: 8px 14px; }
      #status { margin-left: 10px; }
      code { font-family: ui-monospace, monospace; }
    </style>
  </head>
  <body>
    <h1>Pi browser use bridge</h1>
    <p>Run <code>node scripts/bridge.mjs setup</code> in the skill directory, then paste its values below.</p>
    <label>
      Bridge URL
      <input id="bridge-url" type="url" value="ws://127.0.0.1:32123" spellcheck="false">
    </label>
    <label>
      Pairing token
      <input id="bridge-token" type="password" autocomplete="off" spellcheck="false">
    </label>
    <button id="save" type="button">Save and reconnect</button>
    <span id="status" role="status"></span>
    <script src="options.js"></script>
  </body>
</html>
